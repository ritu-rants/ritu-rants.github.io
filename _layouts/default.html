<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <div class="grain-overlay"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-main">Ritu Rants</span>
        <span class="logo-dot">.</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#blog">Blog</a>
      </nav>
    </div>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-tagline">{{ site.description }}</p>
      <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. All rants reserved.</p>
    </div>
  </footer>
</body>
</html>
